<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NearBy – Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 class="brand">NearBy</h1>
      <span class="pin-icon" role="img" aria-label="Location pin">
        <!-- Location pin SVG -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#FFFF33" width="48" height="48">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"/>
        </svg>
      </span>
    </header>

    <main class="card">
      <form class="login-form" action="#" method="post">
        <div class="form-group">
          <input
            type="email"
            id="email"
            name="email"
            class="form-input"
            placeholder="Enter Your Email"
            required
            autocomplete="email"
          />
        </div>

        <div class="form-group">
          <input
            type="password"
            id="password"
            name="password"
            class="form-input"
            placeholder="Enter Your Password"
            required
            autocomplete="current-password"
          />
        </div>

        <button type="submit" class="btn-login">Login</button>

        <p class="signup-link">
          If you don't have an account,
          <a href="#">create an account here</a>
        </p>
      </form>
    </main>
  </div>
</body>
</html>
